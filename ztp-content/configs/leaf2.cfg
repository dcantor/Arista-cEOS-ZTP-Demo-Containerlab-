! ZTP-provisioned config for leaf2
!
hostname leaf2
!
no aaa root
!
username admin privilege 15 role network-admin secret admin
!
service routing protocols model multi-agent
!
ip routing
!
interface Loopback0
   ip address 10.255.0.12/32
!
interface Management1
   description ZTP-managed
   ip address 172.30.0.104/24
   no shutdown
!
interface Ethernet1
   description to spine1
   no switchport
   ip address 10.0.2.1/31
   no shutdown
!
interface Ethernet2
   description to spine2
   no switchport
   ip address 10.0.4.1/31
   no shutdown
!
ip route 0.0.0.0/0 172.30.0.1
!
router bgp 65012
   router-id 10.255.0.12
   no bgp default ipv4-unicast
   neighbor SPINE peer group
   neighbor SPINE send-community
   neighbor SPINE maximum-routes 12000
   neighbor 10.0.2.0 peer group SPINE
   neighbor 10.0.2.0 remote-as 65001
   neighbor 10.0.4.0 peer group SPINE
   neighbor 10.0.4.0 remote-as 65002
   !
   address-family ipv4
      neighbor SPINE activate
      network 10.255.0.12/32
!
management api http-commands
   no shutdown
!
end
