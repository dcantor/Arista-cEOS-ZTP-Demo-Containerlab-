! ZTP-applied NX-OS config for leaf201 (Nexus 9300v)
!
hostname leaf201
!
feature ssh
!
no password strength-check
username admin password 0 cisco role network-admin
!
vrf context management
  ip route 0.0.0.0/0 172.30.0.1
!
interface mgmt0
  description ZTP-managed
  vrf member management
  ip address 172.30.0.121/24
  no shutdown
!
line vty
  exec-timeout 60
!
end
