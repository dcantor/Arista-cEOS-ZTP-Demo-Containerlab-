! ZTP-applied IOS-XE config for leaf101 (CSR1000v)
!
hostname leaf101
!
no aaa new-model
!
ip domain name lab.local
!
username admin privilege 15 secret cisco
enable secret cisco
!
crypto key generate rsa modulus 2048
!
interface GigabitEthernet1
 description ZTP-managed
 ip address 172.30.0.111 255.255.255.0
 no shutdown
!
ip default-gateway 172.30.0.1
ip route 0.0.0.0 0.0.0.0 172.30.0.1
!
ip ssh version 2
!
line vty 0 4
 login local
 transport input ssh
!
end
