! ZTP-provisioned config for spine2
!
hostname spine2
!
no aaa root
!
username admin privilege 15 role network-admin secret admin
!
service routing protocols model multi-agent
!
ip routing
!
interface Loopback0
   ip address 10.255.0.2/32
!
interface Management1
   description ZTP-managed
   ip address 172.30.0.102/24
   no shutdown
!
interface Ethernet1
   description to leaf1
   no switchport
   ip address 10.0.3.0/31
   no shutdown
!
interface Ethernet2
   description to leaf2
   no switchport
   ip address 10.0.4.0/31
   no shutdown
!
ip route 0.0.0.0/0 172.30.0.1
!
router bgp 65002
   router-id 10.255.0.2
   no bgp default ipv4-unicast
   neighbor LEAF peer group
   neighbor LEAF send-community
   neighbor LEAF maximum-routes 12000
   neighbor 10.0.3.1 peer group LEAF
   neighbor 10.0.3.1 remote-as 65011
   neighbor 10.0.4.1 peer group LEAF
   neighbor 10.0.4.1 remote-as 65012
   !
   address-family ipv4
      neighbor LEAF activate
      network 10.255.0.2/32
!
management api http-commands
   no shutdown
!
end
