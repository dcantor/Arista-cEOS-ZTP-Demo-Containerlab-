! ZTP-provisioned config for spine1
!
hostname spine1
!
no aaa root
!
username admin privilege 15 role network-admin secret sha512 $6$dummy$xqe9OtoyXpOVZcYiLVfP9QYhCp8lSYNLXxjjCOL6QtbI9cxsefQiqTlBYdT4S6LgUJ8iJZi3UpHXQU1J3QjjE0
!
service routing protocols model multi-agent
!
ip routing
!
interface Loopback0
   ip address 10.255.0.1/32
!
interface Management0
   description ZTP-managed
   ip address 172.30.0.101/24
   no shutdown
!
interface Ethernet1
   description to leaf1
   no switchport
   ip address 10.0.1.0/31
   no shutdown
!
interface Ethernet2
   description to leaf2
   no switchport
   ip address 10.0.2.0/31
   no shutdown
!
ip route 0.0.0.0/0 172.30.0.1
!
router bgp 65001
   router-id 10.255.0.1
   no bgp default ipv4-unicast
   neighbor LEAF peer group
   neighbor LEAF send-community
   neighbor LEAF maximum-routes 12000
   neighbor 10.0.1.1 peer group LEAF
   neighbor 10.0.1.1 remote-as 65011
   neighbor 10.0.2.1 peer group LEAF
   neighbor 10.0.2.1 remote-as 65012
   !
   address-family ipv4
      neighbor LEAF activate
      network 10.255.0.1/32
!
management api http-commands
   no shutdown
!
end
