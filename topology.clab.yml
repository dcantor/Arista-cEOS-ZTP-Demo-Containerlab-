name: ztp-universal-demo

mgmt:
  network: ztp-mgmt
  ipv4-subnet: 172.30.0.0/24
  ipv4-gw: 172.30.0.1

topology:
  kinds:
    linux:
      image: alpine:3.20

  # YAML anchor: common wiring for every vEOS node.
  defaults:
    kind: linux

  nodes:
    ztp-dhcp:
      kind: linux
      image: dnsmasq-ztp:latest
      mgmt-ipv4: 172.30.0.10
      binds:
        - ztp-server/dnsmasq/dnsmasq.conf:/etc/dnsmasq.conf:ro
        - dhcp-state:/dhcp-state
      cap-add:
        - NET_ADMIN
        - NET_RAW

    ztp-http:
      kind: linux
      image: ztp-app:latest
      mgmt-ipv4: 172.30.0.20
      ports:
        - "8080:80"
      binds:
        - ztp-content:/ztp-content
        - dhcp-state:/dhcp-state          # rw: app writes managed.conf for dnsmasq to include
        - data:/data
        - eos_images:/eos_images:ro       # Arista .swi files (served via /eos-images/<name>)
        - iosxe-images:/iosxe-images:ro   # Cisco IOS-XE .qcow2 files (same endpoint, same vendor-tagged listing)
        - nxos-images:/nxos-images:ro     # Cisco NX-OS .qcow2 / .bin files
        - /var/run/docker.sock:/var/run/docker.sock

    # ---- vEOS nodes ----
    # All four share the same veos-launcher image; per-node identity comes
    # from env (NODE_NAME) which drives deterministic MAC assignment.
    spine1:
      kind: linux
      image: veos-launcher:latest
      env:
        NODE_NAME: spine1
      devices:
        - /dev/kvm
        - /dev/net/tun
      cap-add: [NET_ADMIN, NET_RAW, SYS_NICE]
      binds:
        - vEOS-lab-4.36.0F.qcow2:/vEOS.qcow2:ro
        - data/veos-overlay:/overlay
      stages:
        create:
          wait-for:
            - {node: ztp-dhcp, stage: create}
            - {node: ztp-http, stage: create}

    spine2:
      kind: linux
      image: veos-launcher:latest
      env:
        NODE_NAME: spine2
      devices: [/dev/kvm, /dev/net/tun]
      cap-add: [NET_ADMIN, NET_RAW, SYS_NICE]
      binds:
        - vEOS-lab-4.36.0F.qcow2:/vEOS.qcow2:ro
        - data/veos-overlay:/overlay
      stages:
        create:
          wait-for:
            - {node: ztp-dhcp, stage: create}
            - {node: ztp-http, stage: create}

    leaf1:
      kind: linux
      image: veos-launcher:latest
      env:
        NODE_NAME: leaf1
      devices: [/dev/kvm, /dev/net/tun]
      cap-add: [NET_ADMIN, NET_RAW, SYS_NICE]
      binds:
        - vEOS-lab-4.36.0F.qcow2:/vEOS.qcow2:ro
        - data/veos-overlay:/overlay
      stages:
        create:
          wait-for:
            - {node: ztp-dhcp, stage: create}
            - {node: ztp-http, stage: create}

    leaf2:
      kind: linux
      image: veos-launcher:latest
      env:
        NODE_NAME: leaf2
      devices: [/dev/kvm, /dev/net/tun]
      cap-add: [NET_ADMIN, NET_RAW, SYS_NICE]
      binds:
        - vEOS-lab-4.36.0F.qcow2:/vEOS.qcow2:ro
        - data/veos-overlay:/overlay
      stages:
        create:
          wait-for:
            - {node: ztp-dhcp, stage: create}
            - {node: ztp-http, stage: create}

    # Cisco IOS-XE node (CSR1000v). Standalone — only mgmt interface,
    # no fabric links. The launcher reads VENDOR=cisco and switches to
    # the Cisco QEMU profile (4 GB RAM, IDE disk).
    leaf101:
      kind: linux
      image: veos-launcher:latest
      env:
        NODE_NAME: leaf101
        VENDOR: cisco
      devices: [/dev/kvm, /dev/net/tun]
      cap-add: [NET_ADMIN, NET_RAW, SYS_NICE]
      binds:
        - iosxe-images/csr1000v-universalk9.17.03.04a-serial.qcow2:/vm-image.qcow2:ro
        - data/veos-overlay:/overlay
      stages:
        create:
          wait-for:
            - {node: ztp-dhcp, stage: create}
            - {node: ztp-http, stage: create}

    # Cisco NX-OS node (Nexus 9300v lite). Standalone — only mgmt
    # interface. The launcher reads VENDOR=nexus and uses the NX-OS QEMU
    # profile (4 GB RAM, virtio disk). POAP fetches a Python script via
    # DHCP option 67 on first boot.
    leaf201:
      kind: linux
      image: veos-launcher:latest
      env:
        NODE_NAME: leaf201
        VENDOR: nexus
      devices: [/dev/kvm, /dev/net/tun]
      cap-add: [NET_ADMIN, NET_RAW, SYS_NICE]
      ports:
        # VNC (5900 inside the wrapper) -> host:5901 so we can SEE what
        # the NX-OS bootloader is doing — its early boot prints go to
        # VGA, not serial. From the lab host: vncviewer localhost:5901
        - "5901:5900"
      binds:
        - nxos-images/nexus9300v64-lite.10.5.5.M.qcow2:/vm-image.qcow2:ro
        - data/veos-overlay:/overlay
      stages:
        create:
          wait-for:
            - {node: ztp-dhcp, stage: create}
            - {node: ztp-http, stage: create}

  links:
    - endpoints: [spine1:eth1, leaf1:eth1]
    - endpoints: [spine1:eth2, leaf2:eth1]
    - endpoints: [spine2:eth1, leaf1:eth2]
    - endpoints: [spine2:eth2, leaf2:eth2]
