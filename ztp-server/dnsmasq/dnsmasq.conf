interface=eth0
bind-interfaces
port=0

dhcp-range=172.30.0.100,172.30.0.200,12h
dhcp-authoritative
dhcp-leasefile=/dhcp-state/dnsmasq.leases

dhcp-option=option:router,172.30.0.1

# Serve POAP scripts via TFTP for clients (NX-OS) that ignore the URL
# scheme in option 67 and always prefix tftp://<option 66>/<option 67>.
# The directory is bind-mounted from ztp-content/ztp/ in the topology.
enable-tftp
tftp-root=/tftp-root
tftp-no-fail

log-dhcp

# Per-host MAC reservations. The launcher (veos-launcher/launch.py)
# derives these MACs deterministically from the node name, so they're
# stable across deploys and container restarts.
dhcp-host=ee:2e:ec:35:41:4a,172.30.0.101,set:spine1
dhcp-host=96:67:d9:ee:e3:d3,172.30.0.102,set:spine2
dhcp-host=56:f5:ed:0c:4f:bd,172.30.0.103,set:leaf1
dhcp-host=52:59:c5:44:40:6d,172.30.0.104,set:leaf2
# Cisco CSR1000v (leaf101) — Python ZTP script via Option 67.
dhcp-host=52:e0:1e:fd:6b:b3,172.30.0.111,set:leaf101
# Cisco Nexus 9300v (leaf201) — POAP Python script via Option 67.
dhcp-host=16:6c:2a:51:fc:2e,172.30.0.121,set:leaf201

dhcp-boot=tag:spine1,http://172.30.0.20/ztp/spine1.sh
dhcp-boot=tag:spine2,http://172.30.0.20/ztp/spine2.sh
dhcp-boot=tag:leaf1,http://172.30.0.20/ztp/leaf1.sh
dhcp-boot=tag:leaf2,http://172.30.0.20/ztp/leaf2.sh
dhcp-boot=tag:leaf101,http://172.30.0.20/ztp/leaf101.py
# NX-OS (leaf201): option 67 must be a bare filename. NX-OS POAP
# blindly prefixes tftp://<option-66>/<option-67> so a full URL becomes
# tftp://server/http://server/path which is junk. dnsmasq itself
# serves the file over TFTP from /tftp-root (bind-mounted from
# ztp-content/ztp/), so the script server is 172.30.0.10 (this dnsmasq
# container), NOT 172.30.0.20 (the ztp-app — used later by the script
# itself to HTTP-fetch the per-host config).
dhcp-boot=tag:leaf201,leaf201.py,172.30.0.10
dhcp-option=tag:leaf201,option:tftp-server,172.30.0.10
dhcp-option=tag:leaf201,150,172.30.0.10

# Devices added through the UI (POST /api/managed-devices) live here.
# The ztp-app rewrites this file and SIGHUPs us when it changes.
conf-file=/dhcp-state/managed.conf
