interface=eth0
bind-interfaces
port=0

dhcp-range=172.30.0.100,172.30.0.200,12h
dhcp-authoritative
dhcp-leasefile=/dhcp-state/dnsmasq.leases

dhcp-option=option:router,172.30.0.1

log-dhcp

# Per-host MAC reservations. The launcher (veos-launcher/launch.py)
# derives these MACs deterministically from the node name, so they're
# stable across deploys and container restarts.
dhcp-host=ee:2e:ec:35:41:4a,172.30.0.101,set:spine1
dhcp-host=96:67:d9:ee:e3:d3,172.30.0.102,set:spine2
dhcp-host=56:f5:ed:0c:4f:bd,172.30.0.103,set:leaf1
dhcp-host=52:59:c5:44:40:6d,172.30.0.104,set:leaf2

dhcp-boot=tag:spine1,http://172.30.0.20/ztp/spine1.sh
dhcp-boot=tag:spine2,http://172.30.0.20/ztp/spine2.sh
dhcp-boot=tag:leaf1,http://172.30.0.20/ztp/leaf1.sh
dhcp-boot=tag:leaf2,http://172.30.0.20/ztp/leaf2.sh

# Devices added through the UI (POST /api/managed-devices) live here.
# The ztp-app rewrites this file and SIGHUPs us when it changes.
conf-file=/dhcp-state/managed.conf
