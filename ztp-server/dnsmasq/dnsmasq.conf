interface=eth0
bind-interfaces
port=0

dhcp-range=172.30.0.100,172.30.0.200,12h
dhcp-authoritative
dhcp-leasefile=/dhcp-state/dnsmasq.leases

dhcp-option=option:router,172.30.0.1

log-dhcp

# Single bootfile URL for every cEOS client. The bootstrap script
# reads CLAB_LABEL_CLAB_NODE_NAME from /proc/1/environ to decide which
# per-host config to fetch, so we don't need to identify clients in DHCP.
dhcp-boot=http://172.30.0.20/ztp/bootstrap.sh
